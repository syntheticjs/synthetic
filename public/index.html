<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Hello synthetic world</title>
	<script src="angular.js"></script>
	<script src="synthetic.js"></script>
	<script>
		Synthetic.createComponent({
			name: 'hello-world',
			engine: 'angular'
		}, function($component) {
			$component.template('<h3>Half-ready, need preset. At least it is error.</h3>');
		});

		Synthetic.getComponent('hello-world')
		.createPreset('hi', function($template, $init, $setup) {
			$setup({
				abraca: 'dabra'
			});
			$template('<h1>Hello, world!</h1>');

			$init(function($config, $setup) {
				$config(['+abraca'], function(abraca) {
					debugger;
				});

				setTimeout(function() {
					$setup({
						abraca: 'deniel'
					});
				});
			});
		});
	</script>
</head>
<body>
	<hello-world preset="hi">
		Synthetic is not working
	</hello-world>
	<hr />
	<h4>Runtime log:</h4>
	<ol>
	<script>
		if (Synthetic) document.writeln('<li>Synthetic library loaded...</li>');
	</script>
	</ol>
</body>
</html>
